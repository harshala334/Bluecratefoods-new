name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com/bluecrate
  DO_REGION: nyc1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - store-service
          - order-service
          - payment-service
          - delivery-service
          - tracking-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:latest \
            ./backend/${{ matrix.service }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:latest

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Create Dockerfile for Next.js
        run: |
          cat > ./web/nextjs-client/Dockerfile << 'EOF'
          FROM node:20-alpine AS deps
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci --only=production

          FROM node:20-alpine AS builder
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci
          COPY . .
          RUN npm run build

          FROM node:20-alpine AS runner
          WORKDIR /app
          ENV NODE_ENV production
          RUN addgroup -g 1001 -S nodejs
          RUN adduser -S nextjs -u 1001
          COPY --from=builder --chown=nextjs:nodejs /app/.next ./.next
          COPY --from=builder /app/node_modules ./node_modules
          COPY --from=builder /app/package.json ./package.json
          COPY --from=builder /app/public ./public
          USER nextjs
          EXPOSE 3000
          ENV PORT 3000
          CMD ["npm", "start"]
          EOF

      - name: Build Next.js Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/nextjs-client:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/nextjs-client:latest \
            ./web/nextjs-client

      - name: Push Next.js Docker image
        run: |
          docker push ${{ env.REGISTRY }}/nextjs-client:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/nextjs-client:latest

  deploy:
    needs: [build-and-push, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save bluecrate-cluster

      - name: Update secrets
        run: |
          kubectl create secret generic database-credentials \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASS=${{ secrets.DB_PASS }} \
            --namespace=bluecrate \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic redis-credentials \
            --from-literal=REDIS_HOST=${{ secrets.REDIS_HOST }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --namespace=bluecrate \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f infra/k8s/00-namespace.yaml
          kubectl apply -f infra/k8s/01-kafka.yaml
          kubectl apply -f infra/k8s/02-api-gateway.yaml
          kubectl apply -f infra/k8s/03-auth-service.yaml
          kubectl apply -f infra/k8s/04-user-service.yaml
          kubectl apply -f infra/k8s/05-backend-services.yaml
          kubectl apply -f infra/k8s/06-frontend.yaml
          kubectl apply -f infra/k8s/07-ingress.yaml

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment -n bluecrate
          kubectl rollout status deployment -n bluecrate --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n bluecrate
          kubectl get services -n bluecrate
          kubectl get ingress -n bluecrate
