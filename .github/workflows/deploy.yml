name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: eatee-bdd54
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Google Auth
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v1'

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build and Push API Gateway
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/api-gateway ./backend/api-gateway
          docker push gcr.io/${{ env.PROJECT_ID }}/api-gateway
          gcloud run deploy api-gateway --image gcr.io/${{ env.PROJECT_ID }}/api-gateway --platform managed --region ${{ env.REGION }} --allow-unauthenticated

      # Add other services similarly...
